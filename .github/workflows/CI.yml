name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main, master, dev]

# Cancel in-flight runs for the same PR so pushes don't queue up.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Speeds up compilation by keeping the sccache between runs (optional but nice).
  RUSTFLAGS: "-D warnings"   # treat every compiler warning as an error

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Cache ~/.cargo/registry, ~/.cargo/git and the target/ dir.
      - name: Cache Cargo artefacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (all crates, all features)
        run: cargo clippy --workspace --all-targets --all-features

      - name: Build workspace
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace --all-features -- --nocapture